<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>張懸的聲音 — 故事牆</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <p class="header-label">一面故事牆</p>
      <h1 class="site-title">張懸的聲音</h1>
      <p class="site-en">Deserts Chang · 安溥</p>
      <p class="site-desc">
        如果她的歌曾經在某個時刻出現，<br>
        如果某首曲子恰好接住了你，<br>
        把那個故事留在這裡。<br>
        <span class="desc-small">完全匿名。沒有名字，只有故事。</span>
      </p>
    </div>
  </header>

  <!-- Story Wall -->
  <main class="story-wall" id="storyWall">
    <div class="wall-loading" id="wallLoading">
      <span>故事牆載入中</span>
    </div>
  </main>

  <!-- Write Story FAB -->
  <button class="fab" id="fabBtn" onclick="openModal()">
    <svg class="fab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 5H7a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-5"/>
      <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
    <span class="fab-text">寫下我的故事</span>
  </button>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" onclick="closeModal()" aria-label="關閉">✕</button>
      <h2 class="modal-title" id="modalTitle">寫下你的故事</h2>
      <p class="modal-sub">完全匿名發布，不留下任何身份。</p>

      <div class="form-row">
        <label class="form-label" for="songSelect">最愛的一首張懸歌曲<span class="optional">（可略）</span></label>
        <div class="select-wrap">
          <select class="form-select" id="songSelect">
            <option value="">— 選擇一首歌 —</option>
            <optgroup label="《My Life Will...》2006">
              <option>Scream</option>
              <option>寶貝（in the night）</option>
              <option>迷惑</option>
              <option>So?!...</option>
              <option>Ain't My Man</option>
              <option>My Life Will</option>
              <option>Live 酒館300秒</option>
              <option>信任的樣子</option>
              <option>無狀態</option>
              <option>Malaimo</option>
              <option>寶貝（in a day）</option>
            </optgroup>
            <optgroup label="《親愛的...我還不知道》2007">
              <option>畢竟</option>
              <option>嫁禍進行式</option>
              <option>喜歡</option>
              <option>親愛的</option>
              <option>Gonna Stop</option>
              <option>兒歌</option>
              <option>模樣</option>
              <option>討人厭的字</option>
              <option>欲望把眼前的地板舖滿</option>
              <option>Outro</option>
              <option>並不</option>
            </optgroup>
            <optgroup label="《城市》2009">
              <option>關於我愛你</option>
              <option>Beautiful Woman</option>
              <option>Selling</option>
              <option>南國的孩子</option>
              <option>島嶼雲煙</option>
              <option>就在</option>
              <option>Stay-牡蠣之歌</option>
              <option>城市</option>
              <option>Love, New Year</option>
              <option>巷口</option>
            </optgroup>
            <optgroup label="《神的遊戲》2012">
              <option>玫瑰色的你</option>
              <option>藍天白雲</option>
              <option>兩者</option>
              <option>如何</option>
              <option>危險的，是</option>
              <option>triste</option>
              <option>我想你要走了</option>
              <option>艷火</option>
              <option>日子</option>
            </optgroup>
            <optgroup label="《9522》2022（以安溥名義）">
              <option>idiot</option>
              <option>silence of desire</option>
              <option>李小龍</option>
              <option>白吃白喝</option>
              <option>Miss Missed Love</option>
              <option>說說罷了</option>
              <option>train to heaven</option>
              <option>深夜，you were on my mind</option>
              <option>這世界如此美好</option>
              <option>deserts ride</option>
              <option>女仞之詩</option>
              <option>不識相</option>
              <option>沒有寄的信</option>
              <option>最好的時光</option>
              <option>天高地闊</option>
            </optgroup>
            <option value="__custom__">其他（自填歌名）</option>
          </select>
          <svg class="select-arrow" viewBox="0 0 12 8" fill="none">
            <path d="M1 1l5 5 5-5" stroke="#8B7355" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <input
          type="text"
          class="form-input"
          id="customSong"
          placeholder="輸入歌曲名稱（例如 cover 曲）"
          maxlength="80"
        />
      </div>

      <div class="form-row">
        <label class="form-label" for="storyText">你的故事</label>
        <textarea
          class="form-textarea"
          id="storyText"
          placeholder="她的歌在那個時刻出現，是因為..."
          maxlength="500"
        ></textarea>
        <div class="char-row">
          <span id="charCount">0</span><span class="char-max"> / 500</span>
        </div>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="submitStory()">
        張貼到故事牆
      </button>
    </div>
  </div>

  <!-- Story Detail Modal -->
  <div class="modal-overlay" id="detailOverlay">
    <div class="modal modal--detail" role="dialog" aria-modal="true">
      <button class="modal-close" onclick="closeDetail()" aria-label="關閉">✕</button>
      <div class="detail-song" id="detailSong"></div>
      <div class="detail-content" id="detailContent"></div>
      <div class="detail-date" id="detailDate"></div>

      <div class="detail-actions" id="detailActions">
        <button class="action-btn action-btn--edit" onclick="enterEditMode()">編輯故事</button>
        <button class="action-btn action-btn--delete" onclick="confirmDelete()">刪除</button>
      </div>

      <div class="edit-mode" id="editMode">
        <textarea class="form-textarea" id="editText" maxlength="500"></textarea>
        <div class="char-row">
          <span id="editCharCount">0</span><span class="char-max"> / 500</span>
        </div>
        <div class="edit-actions">
          <button class="action-btn action-btn--cancel" onclick="exitEditMode()">取消</button>
          <button class="submit-btn submit-btn--sm" id="saveEditBtn" onclick="saveEdit()">儲存修改</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
